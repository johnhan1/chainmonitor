name: ci

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m venv .venv
          . .venv/bin/activate
          python -m pip install --upgrade pip
          python -m pip install -r requirements/dev.txt

      - name: AI Review Repair Gate
        id: ai_review_gate
        shell: pwsh
        run: |
          ./scripts/ci-ai-review-repair-gate.ps1 `
            -ReportPath ".artifacts/ai-review-repair/report.json" `
            -SummaryPath ".artifacts/ai-review-repair/summary.md"

      - name: Smoke Check
        run: |
          . .venv/bin/activate
          python -m uvicorn src.app.main:app --host 127.0.0.1 --port 8000 &
          APP_PID=$!
          sleep 3
          curl --fail http://127.0.0.1:8000/healthz
          curl --fail http://127.0.0.1:8000/metrics
          kill $APP_PID

      - name: Upload AI Review Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ai-review-repair-report
          path: |
            .artifacts/ai-review-repair/report.json
            .artifacts/ai-review-repair/summary.md
