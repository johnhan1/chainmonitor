services:
  app:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.app
    container_name: cm-app-lite
    environment:
      CM_APP_ENV: dev
      CM_APP_HOST: 0.0.0.0
      CM_APP_PORT: 8000
      CM_APP_LOG_LEVEL: INFO
      CM_POSTGRES_DSN: postgresql+psycopg://cm:cm@postgres:5432/chainmonitor
      CM_REDIS_URL: redis://redis:6379/0
      CM_CLICKHOUSE_HTTP_URL: http://localhost:8123
      CM_MINIO_ENDPOINT: http://localhost:9002
      CM_BSC_SCHEDULER_ENABLED: "true"
      CM_BSC_SCHEDULER_INTERVAL_SECONDS: "60"
      CM_BSC_SCHEDULER_INITIAL_DELAY_SECONDS: "10"
    command: ["/opt/venv/bin/python", "-m", "uvicorn", "src.app.main:app", "--host", "0.0.0.0", "--port", "8000"]
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  postgres:
    image: postgres:16
    container_name: cm-postgres-lite
    environment:
      POSTGRES_USER: cm
      POSTGRES_PASSWORD: cm
      POSTGRES_DB: chainmonitor
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cm -d chainmonitor"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7
    container_name: cm-redis-lite
    ports:
      - "6379:6379"
    command: ["redis-server", "--appendonly", "yes"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
